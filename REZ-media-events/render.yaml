# render.yaml - REZ Media Events Service
services:
  - type: worker
    name: rez-media-events
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HEALTH_PORT
        value: '3001'
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: INTERNAL_SERVICE_TOKENS_JSON
        sync: false
      - key: SENTRY_DSN
        sync: false
